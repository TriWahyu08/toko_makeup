{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Berhasil - MyBelin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #FFF3FB; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .success-card { background: white; border-radius: 24px; padding: 40px; text-align: center; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(247,47,154,0.15); }
        .success-card .icon { width: 80px; height: 80px; background: #E8F5E9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .success-card .icon i { font-size: 40px; color: #4CAF50; }
        .success-card h3 { font-weight: 700; color: #1a1a1a; }
        .success-card .subtitle { color: #888; font-size: 14px; }
        .success-card .order-info { background: #f8f8f8; border-radius: 12px; padding: 16px; margin: 16px 0; }
        .success-card .order-info .label { font-size: 12px; color: #888; }
        .success-card .order-info .value { font-weight: 700; font-size: 16px; color: #1a1a1a; }
        .btn-back { padding: 12px 40px; border: none; background: #F72F9A; color: white; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; width: 100%; }
        .btn-back:hover { background: #d6257e; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(247,47,154,0.3); }
        @media (max-width: 480px) { .success-card { padding: 24px; } }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h3>Pesanan Berhasil! 🎉</h3>
        <p class="subtitle">Terima kasih, pesananmu sedang kami proses.</p>
        
        <div class="order-info">
            <div class="label">No. Pesanan</div>
            <div class="value" id="orderIdDisplay">INV/2026/06/00123</div>
        </div>
        <div class="order-info">
            <div class="label">Estimasi Tiba</div>
            <div class="value" id="estimationDisplay">2~4 hari</div>
        </div>
        
        <button class="btn-back" onclick="window.location.href='/'">
            <i class="fas fa-arrow-left me-2"></i> Kembali Belanja
        </button>
    </div>
    <script>
        // Ambil data dari localStorage
        const orderData = JSON.parse(localStorage.getItem('lastOrder') || '{}');
        document.getElementById('orderIdDisplay').textContent = orderData.order_id || 'INV/2026/06/00123';
        document.getElementById('estimationDisplay').textContent = orderData.estimation || '2~4 hari';
    </script>
</body>
</html>
