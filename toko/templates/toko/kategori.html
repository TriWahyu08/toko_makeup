{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori - MyBelin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #FFF3FB; padding-bottom: 80px; color: #1a1a1a; }
        
        .header { background: white; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 10px rgba(247, 47, 154, 0.08); }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .header-title { font-size: 20px; font-weight: 800; color: #1a1a1a; text-align: center; flex: 1; }
        .header-title .brand-highlight { color: #F72F9A; }
        .header-title small { font-size: 11px; font-weight: 400; color: #888; letter-spacing: 1px; display: block; margin-top: -2px; }
        .header .back-btn { background: none; border: none; font-size: 20px; color: #1a1a1a; cursor: pointer; padding: 4px; }
        .header .back-btn:hover { color: #F72F9A; }
        
        .search-wrapper { padding: 0 20px 16px; background: white; }
        .search-bar { display: flex; align-items: center; background: #f5f5f5; border-radius: 30px; padding: 8px 18px; transition: all 0.3s; border: 2px solid transparent; }
        .search-bar:focus-within { background: #fff; border-color: #FFCCEC; box-shadow: 0 0 0 4px rgba(247, 47, 154, 0.08); }
        .search-bar i { color: #F72F9A; font-size: 16px; margin-right: 12px; }
        .search-bar input { border: none; background: transparent; padding: 8px 0; font-size: 14px; width: 100%; outline: none; color: #1a1a1a; }
        .search-bar input::placeholder { color: #aaa; }
        
        .category-filters { display: flex; gap: 8px; padding: 12px 20px; overflow-x: auto; flex-wrap: nowrap; background: white; border-bottom: 1px solid #f0f0f0; }
        .category-filters::-webkit-scrollbar { height: 2px; }
        .category-filters::-webkit-scrollbar-thumb { background: #FFCCEC; border-radius: 10px; }
        .category-filters .filter-btn { padding: 6px 20px; border-radius: 20px; border: 2px solid #e8e8e8; background: white; font-size: 13px; font-weight: 600; color: #666; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
        .category-filters .filter-btn:hover { border-color: #F72F9A; color: #F72F9A; }
        .category-filters .filter-btn.active { background: #F72F9A; color: white; border-color: #F72F9A; }
        
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 16px 20px 10px; }
        
        .product-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid #e8e8e8; transition: all 0.3s; cursor: pointer; position: relative; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.10); border-color: #F72F9A; }
        .product-card .product-image { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: white; padding: 16px; display: flex; align-items: center; justify-content: center; position: relative; }
        .product-card .product-image img { width: 100%; height: 100%; object-fit: contain; max-height: 150px; }
        .product-card .product-info { padding: 12px 14px 14px; background: white; }
        .product-card .product-name { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 36px; }
        .product-card .product-brand { font-size: 11px; color: #999; margin-bottom: 4px; }
        .product-card .product-price { font-size: 15px; font-weight: 700; color: #F72F9A; margin-bottom: 4px; }
        .product-card .product-rating { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #888; }
        .product-card .product-rating i { color: #ffb800; font-size: 11px; }
        .product-card .love-btn { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.85); border: none; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #FFCCEC; cursor: pointer; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.08); z-index: 5; }
        .product-card .love-btn:hover { transform: scale(1.15); }
        .product-card .love-btn.loved { color: #F72F9A; }
        .product-card .love-btn.loved:hover { color: #d6257e; }
        
        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 16px 20px 10px; }
        .category-card { background: white; border-radius: 16px; padding: 30px 20px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid #e8e8e8; cursor: pointer; transition: all 0.3s; }
        .category-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.10); border-color: #F72F9A; }
        .category-card i { font-size: 36px; color: #F72F9A; margin-bottom: 8px; }
        .category-card .cat-name { font-weight: 600; font-size: 15px; color: #1a1a1a; }
        .category-card .cat-count { font-size: 12px; color: #999; }
        
        .loading-state { text-align: center; padding: 60px 20px; color: #888; grid-column: 1/-1; }
        .loading-state .spinner { width: 40px; height: 40px; border: 4px solid #FFCCEC; border-top-color: #F72F9A; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; color: #888; grid-column: 1/-1; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 8px 0 12px; box-shadow: 0 -2px 20px rgba(247, 47, 154, 0.08); z-index: 200; border-top: 1px solid #FFCCEC; }
        .bottom-nav .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #999; font-size: 10px; font-weight: 500; padding: 2px 12px; cursor: pointer; background: none; border: none; position: relative; }
        .bottom-nav .nav-item i { font-size: 22px; margin-bottom: 2px; transition: color 0.3s; }
        .bottom-nav .nav-item.active { color: #F72F9A; }
        .bottom-nav .nav-item.active i { color: #F72F9A; }
        .bottom-nav .nav-item:hover { color: #F72F9A; }
        .bottom-nav .nav-item .badge-cart { position: absolute; top: -2px; right: 4px; background: #F72F9A; color: white; font-size: 9px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        @media (min-width: 600px) { .product-grid, .category-grid { grid-template-columns: repeat(3, 1fr); padding: 16px 30px 10px; } .category-filters { padding: 12px 30px; } }
        @media (min-width: 992px) { .product-grid, .category-grid { grid-template-columns: repeat(4, 1fr); padding: 16px 40px 10px; } .category-filters { padding: 12px 40px; } }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-top">
            <button class="back-btn" onclick="window.location.href='/'"><i class="fas fa-arrow-left"></i></button>
            <div class="header-title">
                <span class="brand-highlight">Kategori</span>
                <small>MAYBELLINE</small>
            </div>
            <div style="width:36px;"></div>
        </div>
        <div class="search-wrapper" style="padding:0;">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Cari Kategori ..." id="searchInput">
            </div>
        </div>
    </header>

    <!-- CATEGORY FILTERS -->
    <div class="category-filters" id="categoryFilters">
        <button class="filter-btn active" data-category="all">Semua</button>
        <button class="filter-btn" data-category="face">Wajah</button>
        <button class="filter-btn" data-category="lip">Bibir</button>
        <button class="filter-btn" data-category="eye">Mata</button>
        <button class="filter-btn" data-category="eyebrow">Alis</button>
    </div>

    <!-- CONTENT -->
    <div id="contentArea">
        <div class="category-grid" id="categoryGrid">
            <!-- Category cards will be rendered here -->
        </div>
        <div class="product-grid" id="productGrid" style="display:none;">
            <!-- Product cards will be rendered here -->
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='/'"><i class="fas fa-home"></i>Beranda</button>
        <button class="nav-item active" onclick="window.location.href='{% url "toko:kategori" %}'"><i class="fas fa-th-large"></i>Kategori</button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:favorit" %}'"><i class="fas fa-heart"></i>Favorit</button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:keranjang" %}'"><i class="fas fa-shopping-bag"></i>Keranjang <span class="badge-cart">0</span></button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:pesanan_saya" %}'"><i class="fas fa-receipt"></i>Pesanan</button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:akun" %}'"><i class="fas fa-user"></i>Akun</button>
    </nav>

    <script>
        // ===== FAVORITE FUNCTIONS =====
        function getFavorites() { try { return JSON.parse(localStorage.getItem('favorites')) || []; } catch { return []; } }
        function saveFavorites(favorites) { localStorage.setItem('favorites', JSON.stringify(favorites)); }
        function toggleFavorite(productId) { let favorites = getFavorites(); const index = favorites.indexOf(productId); if (index > -1) { favorites.splice(index, 1); } else { favorites.push(productId); } saveFavorites(favorites); updateAllLoveButtons(); return favorites; }
        function isFavorite(productId) { return getFavorites().includes(productId); }
        function updateAllLoveButtons() { document.querySelectorAll('.love-btn').forEach(btn => { const id = btn.dataset.productId; if (isFavorite(id)) { btn.classList.add('loved'); } else { btn.classList.remove('loved'); } }); }

        let allProducts = [];
        const categoryGrid = document.getElementById('categoryGrid');
        const productGrid = document.getElementById('productGrid');
        const categoryFilters = document.getElementById('categoryFilters');
        const searchInput = document.getElementById('searchInput');

        const categories = [
            { id: 'face', name: 'Wajah', icon: 'fas fa-smile', products: ['foundation', 'concealer', 'powder', 'blush', 'bronzer', 'highlighter'] },
            { id: 'lip', name: 'Bibir', icon: 'fas fa-kiss', products: ['lipstick', 'lip gloss', 'lip balm', 'lip liner'] },
            { id: 'eye', name: 'Mata', icon: 'fas fa-eye', products: ['mascara', 'eyeliner', 'eyeshow', 'eye shadow'] },
            { id: 'eyebrow', name: 'Alis', icon: 'fas fa-pen-fancy', products: ['eyebrow', 'brow pencil', 'brow gel', 'brow mascara'] }
        ];

        async function fetchProducts() {
            try {
                // PAKAI HTTPS!
                const response = await fetch('https://makeup-api.herokuapp.com/api/v1/products.json?brand=maybelline');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('✅ Kategori: Data produk dimuat:', data.length);
                allProducts = data;
                showCategories();
            } catch (error) {
                console.error('❌ Error fetching products:', error);
                categoryGrid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle" style="font-size:32px;color:#F72F9A;display:block;margin-bottom:12px;"></i><p>Gagal memuat data: ${error.message}</p></div>`;
            }
        }

        function getProductCategory(product) {
            const name = (product.name || '').toLowerCase();
            const category = (product.category || '').toLowerCase();
            const productType = (product.product_type || '').toLowerCase();
            const combined = name + ' ' + category + ' ' + productType;
            
            if (combined.includes('lipstick') || combined.includes('lip gloss') || combined.includes('lip balm') || combined.includes('lip liner')) return 'lip';
            if (combined.includes('mascara') || combined.includes('eyeliner') || combined.includes('eyeshadow') || combined.includes('eye shadow')) return 'eye';
            if (combined.includes('eyebrow') || combined.includes('brow pencil') || combined.includes('brow gel')) return 'eyebrow';
            if (combined.includes('foundation') || combined.includes('concealer') || combined.includes('powder') || combined.includes('blush') || combined.includes('bronzer') || combined.includes('highlighter')) return 'face';
            return 'other';
        }

        function showCategories() {
            categoryGrid.style.display = 'grid';
            productGrid.style.display = 'none';
            categoryGrid.innerHTML = '';
            
            const counts = {};
            categories.forEach(cat => { counts[cat.id] = 0; });
            allProducts.forEach(p => { const cat = getProductCategory(p); if (counts[cat] !== undefined) counts[cat]++; });
            
            categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.innerHTML = `
                    <i class="${cat.icon}"></i>
                    <div class="cat-name">${cat.name}</div>
                    <div class="cat-count">${counts[cat.id] || 0} Produk</div>
                `;
                card.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    document.querySelector(`.filter-btn[data-category="${cat.id}"]`).classList.add('active');
                    showProductsByCategory(cat.id);
                });
                categoryGrid.appendChild(card);
            });

            // Tambahkan card "Semua"
            const allCard = document.createElement('div');
            allCard.className = 'category-card';
            allCard.innerHTML = `
                <i class="fas fa-th"></i>
                <div class="cat-name">Semua Produk</div>
                <div class="cat-count">${allProducts.length} Produk</div>
            `;
            allCard.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('.filter-btn[data-category="all"]').classList.add('active');
                showProductsByCategory('all');
            });
            categoryGrid.prepend(allCard);
        }

        function showProductsByCategory(categoryId) {
            categoryGrid.style.display = 'none';
            productGrid.style.display = 'grid';
            productGrid.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Memuat produk...</p></div>';

            let filtered = [];
            if (categoryId === 'all') {
                filtered = allProducts;
            } else {
                const cat = categories.find(c => c.id === categoryId);
                if (cat) {
                    filtered = allProducts.filter(p => {
                        const pCat = getProductCategory(p);
                        return pCat === categoryId;
                    });
                }
            }

            setTimeout(() => {
                productGrid.innerHTML = '';
                if (filtered.length === 0) {
                    productGrid.innerHTML = `<div class="empty-state"><i class="fas fa-box-open" style="font-size:48px;color:#ddd;display:block;margin-bottom:16px;"></i><p>Tidak ada produk di kategori ini</p></div>`;
                    return;
                }
                filtered.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    // ===== KONVERSI USD → IDR =====
                    const USD_TO_IDR = 16000;
                    let price = 'Rp -';
                    if (product.price) {
                        const priceInRupiah = product.price * USD_TO_IDR;
                        price = `Rp${Math.round(priceInRupiah).toLocaleString('id-ID')}`;
                    }
                    
                    let starsHtml = '';
                    const rating = product.rating || 0;
                    const fullStars = Math.floor(rating);
                    const hasHalfStar = rating % 1 >= 0.5;
                    for (let i = 0; i < 5; i++) {
                        if (i < fullStars) starsHtml += '<i class="fas fa-star"></i>';
                        else if (i === fullStars && hasHalfStar) starsHtml += '<i class="fas fa-star-half-alt"></i>';
                        else starsHtml += '<i class="far fa-star"></i>';
                    }
                    const productId = product.id || product.name;
                    const isFav = isFavorite(productId);
                    
                    card.innerHTML = `
                        <div class="product-image">
                            <img src="${product.image_link || 'https://via.placeholder.com/200x200?text=No+Image'}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'">
                            <button class="love-btn ${isFav ? 'loved' : ''}" data-product-id="${productId}" onclick="event.stopPropagation(); toggleFavorite('${productId}');">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>
                        <div class="product-info">
                            <div class="product-name">${product.name || 'Produk'}</div>
                            <div class="product-brand">${product.brand || 'Maybelline'}</div>
                            <div class="product-price">${price}</div>
                            <div class="product-rating"><span>${starsHtml}</span><span>(${product.rating ? (product.rating * 10) : 0}%)</span></div>
                        </div>
                    `;
                    
                    // ===== PERBAIKAN: ARAHKAN KE HALAMAN DETAIL PRODUK =====
                    card.addEventListener('click', function() {
                        const encodedId = encodeURIComponent(productId);
                        window.location.href = `/produk/${encodedId}/`;
                    });
                    
                    productGrid.appendChild(card);
                });
                updateAllLoveButtons();
            }, 300);
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const category = this.dataset.category;
                showProductsByCategory(category);
            });
        });

        // Search
        let searchTimeout;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            const query = this.value.toLowerCase().trim();
            searchTimeout = setTimeout(() => {
                if (query === '') {
                    showCategories();
                    return;
                }
                const filtered = allProducts.filter(p => {
                    const name = (p.name || '').toLowerCase();
                    const brand = (p.brand || '').toLowerCase();
                    return name.includes(query) || brand.includes(query);
                });
                categoryGrid.style.display = 'none';
                productGrid.style.display = 'grid';
                productGrid.innerHTML = '';
                if (filtered.length === 0) {
                    productGrid.innerHTML = `<div class="empty-state"><i class="fas fa-search" style="font-size:32px;color:#ddd;display:block;margin-bottom:12px;"></i><p>Tidak ada produk untuk "<strong>${query}</strong>"</p></div>`;
                    return;
                }
                filtered.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    // ===== KONVERSI USD → IDR =====
                    const USD_TO_IDR = 16000;
                    let price = 'Rp -';
                    if (product.price) {
                        const priceInRupiah = product.price * USD_TO_IDR;
                        price = `Rp${Math.round(priceInRupiah).toLocaleString('id-ID')}`;
                    }
                    
                    let starsHtml = '';
                    const rating = product.rating || 0;
                    const fullStars = Math.floor(rating);
                    const hasHalfStar = rating % 1 >= 0.5;
                    for (let i = 0; i < 5; i++) {
                        if (i < fullStars) starsHtml += '<i class="fas fa-star"></i>';
                        else if (i === fullStars && hasHalfStar) starsHtml += '<i class="fas fa-star-half-alt"></i>';
                        else starsHtml += '<i class="far fa-star"></i>';
                    }
                    const productId = product.id || product.name;
                    const isFav = isFavorite(productId);
                    
                    card.innerHTML = `
                        <div class="product-image">
                            <img src="${product.image_link || 'https://via.placeholder.com/200x200?text=No+Image'}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'">
                            <button class="love-btn ${isFav ? 'loved' : ''}" data-product-id="${productId}" onclick="event.stopPropagation(); toggleFavorite('${productId}');">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>
                        <div class="product-info">
                            <div class="product-name">${product.name || 'Produk'}</div>
                            <div class="product-brand">${product.brand || 'Maybelline'}</div>
                            <div class="product-price">${price}</div>
                            <div class="product-rating"><span>${starsHtml}</span><span>(${product.rating ? (product.rating * 10) : 0}%)</span></div>
                        </div>
                    `;
                    
                    // ===== PERBAIKAN: ARAHKAN KE HALAMAN DETAIL PRODUK =====
                    card.addEventListener('click', function() {
                        const encodedId = encodeURIComponent(productId);
                        window.location.href = `/produk/${encodedId}/`;
                    });
                    
                    productGrid.appendChild(card);
                });
                updateAllLoveButtons();
            }, 300);
        });

        fetchProducts();
    </script>
</body>
</html>
