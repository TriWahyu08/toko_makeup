{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang - MyBelin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #FFF3FB; padding-bottom: 120px; color: #1a1a1a; }
        
        .header { background: white; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 10px rgba(247, 47, 154, 0.08); }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .header-title { font-size: 20px; font-weight: 800; color: #1a1a1a; text-align: center; flex: 1; }
        .header-title .brand-highlight { color: #F72F9A; }
        .header .back-btn { background: none; border: none; font-size: 20px; color: #1a1a1a; cursor: pointer; padding: 4px; }
        .header .back-btn:hover { color: #F72F9A; }
        
        .cart-container { padding: 16px 20px; }
        
        .select-all { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 2px solid #f0f0f0; margin-bottom: 16px; }
        .select-all input[type="checkbox"] { width: 20px; height: 20px; accent-color: #F72F9A; cursor: pointer; }
        .select-all label { font-weight: 600; color: #1a1a1a; cursor: pointer; }
        
        .cart-item { background: white; border-radius: 16px; padding: 14px; border: 1px solid #e8e8e8; margin-bottom: 12px; display: flex; gap: 14px; align-items: center; transition: all 0.3s; }
        .cart-item:hover { border-color: #F72F9A; }
        .cart-item .item-checkbox { width: 20px; height: 20px; accent-color: #F72F9A; cursor: pointer; flex-shrink: 0; }
        .cart-item .item-image { width: 70px; height: 70px; flex-shrink: 0; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid #f0f0f0; }
        .cart-item .item-image img { width: 100%; height: 100%; object-fit: contain; max-height: 60px; }
        .cart-item .item-info { flex: 1; min-width: 0; }
        .cart-item .item-name { font-size: 13px; font-weight: 600; color: #1a1a1a; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .cart-item .item-brand { font-size: 11px; color: #999; }
        .cart-item .item-price { font-size: 14px; font-weight: 700; color: #F72F9A; margin-top: 2px; }
        .cart-item .item-actions { display: flex; align-items: center; gap: 8px; }
        .cart-item .qty-btn { width: 28px; height: 28px; border: 1px solid #e0e0e0; background: white; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .cart-item .qty-btn:hover { border-color: #F72F9A; color: #F72F9A; }
        .cart-item .qty-text { font-weight: 600; font-size: 14px; min-width: 24px; text-align: center; }
        .cart-item .delete-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; transition: all 0.3s; padding: 4px; }
        .cart-item .delete-btn:hover { color: #D32F2F; transform: scale(1.1); }
        
        .cart-summary { position: fixed; bottom: 60px; left: 0; right: 0; background: white; padding: 16px 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.06); border-top: 1px solid #f0f0f0; }
        .cart-summary .summary-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; color: #666; }
        .cart-summary .summary-row.total { font-weight: 700; font-size: 18px; color: #1a1a1a; border-top: 2px solid #f0f0f0; padding-top: 12px; margin-top: 8px; }
        .cart-summary .summary-row.total .total-price { color: #F72F9A; }
        .cart-summary .btn-checkout { width: 100%; padding: 14px; border: none; background: #F72F9A; color: white; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.3s; margin-top: 12px; }
        .cart-summary .btn-checkout:hover { background: #d6257e; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(247,47,154,0.3); }
        .cart-summary .btn-checkout:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .empty-cart { text-align: center; padding: 80px 20px; color: #888; }
        .empty-cart i { font-size: 48px; color: #FFCCEC; margin-bottom: 16px; }
        .empty-cart h5 { color: #1a1a1a; font-weight: 600; }
        .empty-cart .btn-shop { margin-top: 16px; padding: 10px 30px; border: none; background: #F72F9A; color: white; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .empty-cart .btn-shop:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(247,47,154,0.3); }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 8px 0 12px; box-shadow: 0 -2px 20px rgba(247, 47, 154, 0.08); z-index: 200; border-top: 1px solid #FFCCEC; }
        .bottom-nav .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #999; font-size: 10px; font-weight: 500; padding: 2px 12px; cursor: pointer; background: none; border: none; position: relative; }
        .bottom-nav .nav-item i { font-size: 22px; margin-bottom: 2px; transition: color 0.3s; }
        .bottom-nav .nav-item.active { color: #F72F9A; }
        .bottom-nav .nav-item.active i { color: #F72F9A; }
        .bottom-nav .nav-item:hover { color: #F72F9A; }
        .bottom-nav .nav-item .badge-cart { position: absolute; top: -2px; right: 4px; background: #F72F9A; color: white; font-size: 9px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .toast-message { position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast-message.show { opacity: 1; }
        
        @media (min-width: 600px) { .cart-container { padding: 16px 30px; max-width: 600px; margin: 0 auto; } }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-top">
            <button class="back-btn" onclick="window.location.href='/'"><i class="fas fa-arrow-left"></i></button>
            <div class="header-title">
                <span class="brand-highlight">Keranjang</span>
            </div>
            <div style="width:36px;"></div>
        </div>
    </header>

    <!-- CART CONTENT -->
    <div class="cart-container" id="cartContainer">
        <!-- Cart items will be rendered here -->
    </div>

    <!-- CART SUMMARY -->
    <div class="cart-summary" id="cartSummary" style="display:none;">
        <div class="summary-row">
            <span>Total Harga (<span id="itemCount">0</span> item)</span>
            <span id="subtotal">Rp 0</span>
        </div>
        <div class="summary-row">
            <span>Biaya Pengiriman</span>
            <span id="shippingCost">Rp 0</span>
        </div>
        <div class="summary-row total">
            <span>Total</span>
            <span class="total-price" id="totalPrice">Rp 0</span>
        </div>
        <button class="btn-checkout" id="checkoutBtn" onclick="proceedToCheckout()">Beli Sekarang</button>
    </div>

    <!-- TOAST -->
    <div class="toast-message" id="toastMessage"></div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='/'"><i class="fas fa-home"></i>Beranda</button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:kategori" %}'"><i class="fas fa-th-large"></i>Kategori</button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:favorit" %}'"><i class="fas fa-heart"></i>Favorit</button>
        <button class="nav-item active" onclick="window.location.href='{% url "toko:keranjang" %}'"><i class="fas fa-shopping-bag"></i>Keranjang <span class="badge-cart" id="cartBadge">0</span></button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:pesanan_saya" %}'"><i class="fas fa-receipt"></i>Pesanan</button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:akun" %}'"><i class="fas fa-user"></i>Akun</button>
    </nav>

    <script>
        // ===== CONSTANTS =====
        const USD_TO_IDR = 16000;

        // ===== FORMAT PRICE =====
        function formatPrice(priceInUSD) {
            if (!priceInUSD || priceInUSD === 0) return 'Rp 0';
            const priceInRupiah = priceInUSD * USD_TO_IDR;
            return `Rp${Math.round(priceInRupiah).toLocaleString('id-ID')}`;
        }

        // ===== CART FUNCTIONS =====
        function getCart() { 
            try { return JSON.parse(localStorage.getItem('cart')) || []; } 
            catch { return []; } 
        }
        
        function saveCart(cart) { 
            localStorage.setItem('cart', JSON.stringify(cart)); 
            updateCartBadge(); 
            renderCart(); 
        }

        function updateCartBadge() {
            const cart = getCart();
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.querySelectorAll('#cartBadge').forEach(badge => {
                badge.textContent = total;
            });
        }

        let cartItems = [];

        function renderCart() {
            const container = document.getElementById('cartContainer');
            const summary = document.getElementById('cartSummary');
            cartItems = getCart();

            if (cartItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-bag"></i>
                        <h5>Keranjang Belanja Kosong</h5>
                        <p class="text-muted">Yuk, mulai belanja produk favoritmu!</p>
                        <button class="btn-shop" onclick="window.location.href='{% url "toko:kategori" %}'">Jelajahi Produk</button>
                    </div>
                `;
                summary.style.display = 'none';
                return;
            }

            summary.style.display = 'block';

            let html = `
                <div class="select-all">
                    <input type="checkbox" id="selectAll" ${cartItems.every(item => item.selected !== false) ? 'checked' : ''} onchange="toggleSelectAll()">
                    <label for="selectAll">Pilih Semua</label>
                </div>
            `;

            cartItems.forEach((item, index) => {
                // ===== PERBAIKAN: Gunakan item.price, BUKAN product.price =====
                const priceDisplay = formatPrice(item.price);
                const selected = item.selected !== false;
                
                html += `
                    <div class="cart-item" data-index="${index}">
                        <input type="checkbox" class="item-checkbox" ${selected ? 'checked' : ''} onchange="toggleItem(${index})">
                        <div class="item-image">
                            <img src="${item.image || 'https://via.placeholder.com/70x70?text=No+Image'}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/70x70?text=No+Image'">
                        </div>
                        <div class="item-info">
                            <div class="item-name">${item.name || 'Produk'}</div>
                            <div class="item-brand">${item.brand || 'Maybelline'}</div>
                            <div class="item-price">${priceDisplay}</div>
                        </div>
                        <div class="item-actions">
                            <button class="qty-btn" onclick="updateQuantity(${index}, -1)">−</button>
                            <span class="qty-text">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                            <button class="delete-btn" onclick="removeItem(${index})"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            updateSummary();
        }

        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            cartItems.forEach(item => { item.selected = checked; });
            saveCart(cartItems);
        }

        function toggleItem(index) {
            cartItems[index].selected = !cartItems[index].selected;
            saveCart(cartItems);
        }

        function updateQuantity(index, delta) {
            const newQty = cartItems[index].quantity + delta;
            if (newQty <= 0) {
                removeItem(index);
                return;
            }
            cartItems[index].quantity = newQty;
            saveCart(cartItems);
        }

        function removeItem(index) {
            cartItems.splice(index, 1);
            saveCart(cartItems);
            showToast('🗑️ Item dihapus dari keranjang');
        }

        function updateSummary() {
            const selectedItems = cartItems.filter(item => item.selected !== false);
            const totalItems = selectedItems.reduce((sum, item) => sum + item.quantity, 0);
            
            // ===== HITUNG SUBTOTAL DENGAN KONVERSI USD → IDR =====
            const subtotalUSD = selectedItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const subtotalIDR = subtotalUSD * USD_TO_IDR;
            
            // ===== SHIPPING = 0 (BELUM ADA ALAMAT) =====
            const shipping = 0;
            const total = subtotalIDR + shipping;

            document.getElementById('itemCount').textContent = totalItems;
            document.getElementById('subtotal').textContent = `Rp${Math.round(subtotalIDR).toLocaleString('id-ID')}`;
            document.getElementById('shippingCost').textContent = `Rp${shipping.toLocaleString('id-ID')}`;
            document.getElementById('totalPrice').textContent = `Rp${Math.round(total).toLocaleString('id-ID')}`;
            
            const checkoutBtn = document.getElementById('checkoutBtn');
            checkoutBtn.disabled = totalItems === 0;
        }

        function proceedToCheckout() {
            const selectedItems = cartItems.filter(item => item.selected !== false);
            if (selectedItems.length === 0) {
                showToast('⚠️ Pilih minimal satu produk untuk checkout');
                return;
            }
            
            // ===== KONVERSI HARGA KE RUPIAH SEBELUM DIKIRIM KE CHECKOUT =====
            const checkoutItems = selectedItems.map(item => ({
                ...item,
                price: item.price * USD_TO_IDR, // Simpan dalam Rupiah
                price_display: formatPrice(item.price)
            }));
            
            localStorage.setItem('checkoutItems', JSON.stringify(checkoutItems));
            window.location.href = "{% url 'toko:checkout' %}";
        }

        function showToast(message) {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        // ===== INIT =====
        updateCartBadge();
        renderCart();
    </script>
</body>
</html>
