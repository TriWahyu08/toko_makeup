{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Beauty Assistant - MyBelin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #FFF3FB; 
            padding-bottom: 80px; 
            color: #1a1a1a;
            height: 100vh;
            overflow: hidden;
        }
        
        /* ===== HEADER ===== */
        .header { 
            background: linear-gradient(135deg, #F72F9A, #d6257e);
            padding: 16px 20px 14px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 4px 25px rgba(247, 47, 154, 0.3);
        }
        .header-top { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .header .back-btn { 
            background: rgba(255,255,255,0.2);
            border: none;
            font-size: 18px; 
            color: white; 
            cursor: pointer; 
            padding: 8px 12px;
            border-radius: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }
        .header .back-btn:hover { 
            background: rgba(255,255,255,0.3);
            transform: translateX(-4px);
        }
        .header-title { 
            font-size: 18px; 
            font-weight: 700; 
            flex: 1;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-title .brand-highlight { 
            color: #FFCCEC;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }
        .header-title .ai-badge {
            background: rgba(255,255,255,0.15);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .header .avatar-mini {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }
        
        /* ===== CHAT CONTAINER ===== */
        .chat-container { 
            display: flex; 
            flex-direction: column; 
            height: calc(100vh - 145px); 
            max-width: 700px; 
            margin: 0 auto; 
            padding: 16px 20px; 
            background: #FFF3FB;
        }
        
        /* ===== CHAT MESSAGES ===== */
        .chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 8px 4px 8px 0; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #FFCCEC;
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #F72F9A;
            border-radius: 10px;
        }
        
        .chat-messages .message { 
            max-width: 85%; 
            padding: 14px 18px; 
            border-radius: 18px; 
            font-size: 14px; 
            line-height: 1.7; 
            animation: fadeIn 0.4s ease; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .chat-messages .message.user { 
            align-self: flex-end; 
            background: linear-gradient(135deg, #F72F9A, #e6397a);
            color: white; 
            border-bottom-right-radius: 4px; 
            box-shadow: 0 4px 15px rgba(247, 47, 154, 0.2);
        }
        .chat-messages .message.ai { 
            align-self: flex-start; 
            background: white; 
            border: 1px solid #f0f0f0;
            color: #1a1a1a; 
            border-bottom-left-radius: 4px; 
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .chat-messages .message .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 6px;
            display: block;
            text-align: right;
        }
        .chat-messages .message.user .message-time {
            color: rgba(255,255,255,0.6);
        }
        .chat-messages .message.ai .message-time {
            color: #bbb;
        }
        
        .chat-messages .message.ai .product-name {
            color: #F72F9A;
            font-weight: 600;
        }
        .chat-messages .message.ai .price-tag {
            background: #FFF0F5;
            color: #F72F9A;
            padding: 1px 10px;
            border-radius: 12px;
            font-weight: 600;
            display: inline-block;
            font-size: 12px;
        }
        .chat-messages .message.ai .bullet {
            display: block;
            padding-left: 20px;
            position: relative;
            margin: 2px 0;
        }
        .chat-messages .message.ai .bullet::before {
            content: '✦';
            color: #F72F9A;
            position: absolute;
            left: 0;
            font-size: 12px;
        }
        .chat-messages .message.ai .divider {
            border: none;
            border-top: 1px solid #f5f5f5;
            margin: 8px 0;
        }
        
        /* ===== TYPING INDICATOR ===== */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 0;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ===== EMPTY CHAT ===== */
        .empty-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
            text-align: center;
            padding: 40px 20px;
        }
        .empty-chat .empty-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFF0F5, #FFCCEC);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 30px rgba(247, 47, 154, 0.08);
        }
        .empty-chat .empty-icon i { 
            font-size: 36px; 
            color: #F72F9A; 
        }
        .empty-chat h5 { 
            color: #1a1a1a; 
            font-weight: 700; 
            font-size: 18px;
        }
        .empty-chat p { 
            font-size: 14px; 
            color: #999; 
            margin-bottom: 12px;
        }
        
        /* ===== SUGGESTIONS ===== */
        .suggestions { 
            display: flex; 
            gap: 8px; 
            flex-wrap: wrap; 
            justify-content: center;
            padding: 4px 0; 
        }
        .suggestions .suggestion { 
            padding: 8px 18px; 
            border: 1.5px solid #f0f0f0; 
            border-radius: 30px; 
            font-size: 12px; 
            font-weight: 500;
            color: #666; 
            cursor: pointer; 
            transition: all 0.3s; 
            background: white; 
        }
        .suggestions .suggestion:hover { 
            border-color: #F72F9A; 
            color: #F72F9A; 
            background: #FFF5F8; 
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(247,47,154,0.08);
        }
        .suggestions .suggestion i {
            margin-right: 4px;
            font-size: 10px;
            color: #F72F9A;
        }
        
        /* ===== CHAT INPUT ===== */
        .chat-input { 
            display: flex; 
            gap: 10px; 
            padding: 14px 0 8px; 
            background: #FFF3FB; 
            border-top: 1px solid #f0f0f0; 
        }
        .chat-input .input-wrapper {
            flex: 1;
            position: relative;
        }
        .chat-input input { 
            width: 100%; 
            padding: 14px 20px; 
            border: 2px solid #e8e8e8; 
            border-radius: 30px; 
            font-size: 14px; 
            outline: none; 
            transition: all 0.3s; 
            background: white;
            font-family: 'Inter', sans-serif;
        }
        .chat-input input:focus { 
            border-color: #F72F9A; 
            box-shadow: 0 0 0 4px rgba(247,47,154,0.06); 
        }
        .chat-input input::placeholder {
            color: #bbb;
        }
        .chat-input button { 
            padding: 14px 22px; 
            border: none; 
            background: linear-gradient(135deg, #F72F9A, #d6257e);
            color: white; 
            border-radius: 30px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s; 
            box-shadow: 0 4px 15px rgba(247,47,154,0.2);
        }
        .chat-input button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 30px rgba(247,47,154,0.3); 
        }
        .chat-input button:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none; 
        }
        .chat-input button i {
            font-size: 16px;
        }
        
        /* ===== BOTTOM NAV ===== */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: white; 
            display: flex; 
            justify-content: space-around; 
            padding: 8px 0 12px; 
            box-shadow: 0 -4px 25px rgba(0,0,0,0.04); 
            z-index: 200; 
            border-top: 1px solid #f8f8f8; 
        }
        .bottom-nav .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            color: #999; 
            font-size: 10px; 
            font-weight: 500; 
            padding: 2px 12px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            transition: all 0.3s;
            position: relative;
        }
        .bottom-nav .nav-item i { 
            font-size: 22px; 
            margin-bottom: 2px; 
            transition: color 0.3s; 
        }
        .bottom-nav .nav-item.active { color: #F72F9A; }
        .bottom-nav .nav-item.active i { color: #F72F9A; }
        .bottom-nav .nav-item:hover { color: #F72F9A; }
        .bottom-nav .nav-item .badge-cart { 
            position: absolute; 
            top: -2px; 
            right: 4px; 
            background: #F72F9A; 
            color: white; 
            font-size: 9px; 
            font-weight: 700; 
            width: 18px; 
            height: 18px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        /* ===== TOAST ===== */
        .toast-message { 
            position: fixed; 
            bottom: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #333; 
            color: white; 
            padding: 12px 24px; 
            border-radius: 14px; 
            font-size: 14px; 
            z-index: 300; 
            opacity: 0; 
            transition: all 0.3s; 
            pointer-events: none; 
            max-width: 90%; 
            text-align: center; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .toast-message.show { opacity: 1; }
        
        @media (max-width: 480px) {
            .chat-container { padding: 12px 16px; }
            .chat-messages .message { max-width: 92%; padding: 12px 14px; font-size: 13px; }
            .header-title { font-size: 16px; }
            .suggestions .suggestion { font-size: 11px; padding: 6px 14px; }
            .chat-input input { padding: 12px 16px; font-size: 13px; }
            .chat-input button { padding: 12px 18px; }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-top">
            <button class="back-btn" onclick="window.location.href='{% url "toko:akun" %}'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="header-title">
                <span class="brand-highlight">AI</span> Beauty Assistant
                <span class="ai-badge">✨ BETA</span>
            </div>
            <div class="avatar-mini">
                {{ user.first_name|default:user.username|slice:":1"|upper }}
            </div>
        </div>
    </header>

    <!-- ===== CHAT ===== -->
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="empty-chat" id="emptyChat">
                <div class="empty-icon">
                    <i class="fas fa-wand-magic-sparkles"></i>
                </div>
                <h5>Halo, Beauty Lovers! 💄</h5>
                <p>Tanya apa saja tentang produk Maybelline<br>atau minta rekomendasi makeup terbaik!</p>
                <div class="suggestions">
                    <span class="suggestion" onclick="sendSuggestion('Foundation untuk kulit berminyak')">
                        <i class="fas fa-chevron-right"></i> Foundation berminyak
                    </span>
                    <span class="suggestion" onclick="sendSuggestion('Lipstick tahan lama yang cocok untuk sehari-hari')">
                        <i class="fas fa-chevron-right"></i> Lipstick tahan lama
                    </span>
                    <span class="suggestion" onclick="sendSuggestion('Rekomendasi produk untuk kulit sensitif dan berjerawat')">
                        <i class="fas fa-chevron-right"></i> Kulit sensitif
                    </span>
                </div>
            </div>
        </div>
        
        <!-- ===== CHAT INPUT ===== -->
        <div class="chat-input">
            <div class="input-wrapper">
                <input type="text" id="chatInput" placeholder="Tanyakan tentang makeup..." onkeypress="if(event.key==='Enter') sendMessage()">
            </div>
            <button id="sendBtn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- ===== BOTTOM NAV ===== -->
    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='/'">
            <i class="fas fa-home"></i> Beranda
        </button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:kategori" %}'">
            <i class="fas fa-th-large"></i> Kategori
        </button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:favorit" %}'">
            <i class="fas fa-heart"></i> Favorit
        </button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:keranjang" %}'">
            <i class="fas fa-shopping-bag"></i> Keranjang
            <span class="badge-cart" id="cartBadge">0</span>
        </button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:pesanan_saya" %}'">
            <i class="fas fa-receipt"></i> Pesanan
        </button>
        <button class="nav-item" onclick="window.location.href='{% url "toko:akun" %}'">
            <i class="fas fa-user"></i> Akun
        </button>
    </nav>

    <!-- ===== TOAST ===== -->
    <div class="toast-message" id="toastMessage"></div>

    <script>
        // ===== TOAST =====
        function showToast(message) {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        // ===== CART BADGE =====
        function updateCartBadge() {
            try {
                const cart = JSON.parse(localStorage.getItem('cart')) || [];
                const total = cart.reduce((sum, item) => sum + item.quantity, 0);
                document.querySelectorAll('#cartBadge').forEach(badge => {
                    badge.textContent = total;
                });
            } catch { }
        }
        updateCartBadge();

        // ===== GET CSRF TOKEN =====
        function getCSRFToken() {
            const cookie = document.cookie.split('; ').find(row => row.startsWith('csrftoken='));
            return cookie ? cookie.split('=')[1] : '';
        }

        // ===== FORMAT TIME =====
        function getTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
        }

        // ===== ADD MESSAGE =====
        function addMessage(text, type, time) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            // Cek apakah ada format bullet dari AI
            if (type === 'ai') {
                // Proses bullet points
                let formattedText = text;
                formattedText = formattedText.replace(/\n/g, '<br>');
                // Ubah bullet - menjadi bullet custom
                formattedText = formattedText.replace(/• /g, '<span class="bullet">');
                // Hapus markdown **
                formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<span class="product-name">$1</span>');
                
                div.innerHTML = formattedText + `<span class="message-time">${time || getTime()}</span>`;
            } else {
                div.innerHTML = text + `<span class="message-time">${time || getTime()}</span>`;
            }
            
            // Hapus empty chat jika ada
            const emptyChat = document.getElementById('emptyChat');
            if (emptyChat) emptyChat.remove();
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // ===== SEND MESSAGE =====
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            input.value = '';
            addMessage(message, 'user', getTime());

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

            try {
                const response = await fetch('/api/ai-chat/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCSRFToken(),
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                if (data.reply) {
                    addMessage(data.reply, 'ai', getTime());
                } else {
                    addMessage('Maaf, saya sedang bermasalah. Coba lagi nanti.', 'ai', getTime());
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('⚠️ Gagal terhubung ke AI. Periksa koneksi internet.', 'ai', getTime());
            }

            sendBtn.disabled = false;
            sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        }

        // ===== SEND SUGGESTION =====
        function sendSuggestion(text) {
            document.getElementById('chatInput').value = text;
            sendMessage();
        }

        // ===== ENTER KEY =====
        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // ===== SCROLL TO BOTTOM ON LOAD =====
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        });
    </script>
</body>
</html>
