{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Gagal - MyBelin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #FFF3FB; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .failed-card { background: white; border-radius: 24px; padding: 40px; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 20px 60px rgba(247,47,154,0.15); }
        .failed-card i { font-size: 64px; color: #D32F2F; margin-bottom: 16px; }
        .failed-card h3 { font-weight: 700; }
        .failed-card p { color: #888; }
        .btn-retry { margin-top: 20px; padding: 12px 40px; border: none; background: #F72F9A; color: white; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-retry:hover { background: #d6257e; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(247,47,154,0.3); }
        .btn-home { margin-top: 8px; padding: 12px 40px; border: none; background: transparent; color: #666; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .btn-home:hover { background: #f5f5f5; }
    </style>
</head>
<body>
    <div class="failed-card">
        <i class="fas fa-times-circle"></i>
        <h3>Pembayaran Gagal ❌</h3>
        <p>Maaf, pembayaran Anda tidak dapat diproses. Silakan coba lagi.</p>
        <button class="btn-retry" onclick="window.history.back()">Coba Lagi</button>
        <button class="btn-home" onclick="window.location.href='/'">Kembali ke Beranda</button>
    </div>
</body>
</html>
